name: CI

on:
  push:
    branches: [main, "claude/**", "cursor/**", "feature/**", "perf/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: Build & Test (iOS)
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Lyo.xcodeproj \
            -scheme Lyo

      - name: Build & test
        run: |
          set -o pipefail
          DEST=$(xcrun simctl list devices available | grep -m1 -oE "iPhone [0-9]+[^(]*" | head -1 | xargs)
          echo "Simulator: ${DEST:-iPhone 15}"
          xcodebuild test \
            -project Lyo.xcodeproj \
            -scheme Lyo \
            -destination "platform=iOS Simulator,name=${DEST:-iPhone 15},OS=latest" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

  android:
    name: Build (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

  web:
    name: Typecheck & Build (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: web
        run: npx tsc --noEmit

      - name: Build
        working-directory: web
        run: npx next build
