name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    # Branch pushes with an open PR already build via pull_request;
    # listing them here too ran every job twice per push.
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: Cross-platform parity contract
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Community capabilities and design tokens
        run: node scripts/verify-community-parity.mjs

      - name: Verify canonical chat continuity contract
        run: node scripts/verify-chat-continuity.mjs

      - name: Verify canonical learning progress contract
        run: node scripts/verify-learning-progress-parity.mjs

      - name: Verify primary navigation and Create contract
        run: node scripts/verify-primary-navigation-parity.mjs

  ios:
    name: Build & Test (iOS)
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Lyo.xcodeproj \
            -scheme Lyo

      - name: Build & test
        run: |
          set -o pipefail
          DEST=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          names = sorted(
              d['name']
              for runtime in devices.values()
              for d in runtime
              if d.get('isAvailable') and d['name'].startswith('iPhone')
          )
          print(names[-1] if names else '')")
          if [ -z "$DEST" ]; then
            echo "::error::No available iPhone simulator on this runner"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Simulator: $DEST"
          xcodebuild test \
            -project Lyo.xcodeproj \
            -scheme Lyo \
            -destination "platform=iOS Simulator,name=$DEST" \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

  android:
    name: Build (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

  web:
    name: Typecheck & Build (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Classroom contract tests
        working-directory: web
        run: npm run test:classroom

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Build
        working-directory: web
        run: npm run build

  publish-web-image:
    name: Publish production web image
    runs-on: ubuntu-latest
    needs: [parity, web, android, ios]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/web" >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
