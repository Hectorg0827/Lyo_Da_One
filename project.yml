name: Lyo
options:
  bundleIdPrefix: com.lyo
  deploymentTarget:
    iOS: "17.0"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.0.0
  Nuke:
    url: https://github.com/kean/Nuke
    from: 12.0.0
  LaTeXSwiftUI:
    url: https://github.com/colinc86/LaTeXSwiftUI
    from: 1.3.4
  
targets:
  Lyo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - Tests/**
          # Old "Live" classroom path — replaced by LivingClassroomView +
          # LivingClassroomService (the active-lesson UI). The legacy code
          # references types that no longer exist on the canonical models
          # (.hook / .summary / .quiz on GenerationCourseModule). Excluded
          # here so we don't burn build time on dead code.
          - Views/Main/Classroom/LiveClassroomView.swift
          - ViewModels/LiveClassroomViewModel.swift
      - path: PrivacyInfo.xcprivacy
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.lyo.app
      INFOPLIST_FILE: Sources/Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_VERSION: "5.0"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      TARGETED_DEVICE_FAMILY: "1,2"
      ENABLE_DEBUG_DYLIB: NO
      ENABLE_PREVIEWS_DYLIB: NO
      DEAD_CODE_STRIPPING: YES
      SWIFT_USE_EXPLICIT_MODULE_BUILD_SYSTEM: NO
      COMPRESS_PNG_FILES: NO
      ASSETCATALOG_COMPILER_COMPRESS_PNGS: NO
      ENABLE_ON_DEMAND_RESOURCES: NO
      OTHER_LDFLAGS: $(inherited) -Xlinker -no_warn_duplicate_libraries
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: AVKit.framework
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseAnalytics
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
      - package: LaTeXSwiftUI
        product: LaTeXSwiftUI

  LyoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      GENERATE_INFOPLIST_FILE: YES
    sources:
      - Sources/Tests
    dependencies:
      - target: Lyo

schemes:
  Lyo:
    build:
      targets:
        Lyo: all
        LyoTests: all
    run:
      environmentVariables:
        IDE_DISABLED_OS_ACTIVITY_MODE: "disable"
        LYO_USE_LOCALHOST: "0"
        # Set to your Railway public HTTPS URL when the default AppConfig host is wrong or not fully deployed:
        # LYO_API_BASE_URL: "https://YOUR-SERVICE.up.railway.app"
        # Optional explicit WSS URL (otherwise derived from LYO_API_BASE_URL or LyoAPIBaseURL):
        # LYO_WS_URL: "wss://YOUR-SERVICE.up.railway.app/ws"
    test:
      targets:
        - LyoTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
