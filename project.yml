name: Lyo
options:
  bundleIdPrefix: com.lyo
  deploymentTarget:
    iOS: "17.0"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.0.0
  
targets:
  Lyo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - Tests/**
      - path: PrivacyInfo.xcprivacy
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.lyo.app
      INFOPLIST_FILE: Sources/Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_VERSION: "5.0"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      TARGETED_DEVICE_FAMILY: "1,2"
      ENABLE_DEBUG_DYLIB: NO
      ENABLE_PREVIEWS_DYLIB: NO
      DEAD_CODE_STRIPPING: YES
      OTHER_LDFLAGS: $(inherited) -Xlinker -no_warn_duplicate_libraries
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: AVKit.framework
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCrashlytics

schemes:
  Lyo:
    build:
      targets:
        Lyo: all
    run:
      environmentVariables:
        IDE_DISABLED_OS_ACTIVITY_MODE: "disable"
    test:
      targets:
        - Lyo
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
